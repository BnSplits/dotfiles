;====================
; Color definitions
;====================
[colors]
background = ${xrdb:color0:#222}
foreground = ${xrdb:color7:#222}
foreground-alt = ${xrdb:color7:#222}
primary = ${xrdb:color1:#222}
secondary = ${xrdb:color2:#222}
alert = ${xrdb:color3:#222}

;====================
; Bar settings
;====================
[bar/mybar]
width = 100%
height = 24pt
radius = 6
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-bottom-size = 0pt
border-top-size = 4pt
border-left-size = 6pt
border-right-size = 6pt
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.foreground}
font-0 = "Fira Code:weight=100:size=11;0"
font-1 = "monospace:style=Italic:size=12"
font-2 = "Font Awesome 6 Free Solid:style=Solid:size=11;1"
font-3 = "Font Awesome 6 Brands Regular:pixelsize=11;1"
font-4 = "Font Awesome 6 Free Regular:pixelsize=11;1"
font-5 = "Font Awesome 6 Free Solid:pixelsize=11;1"
modules-center = 
modules-left = xworkspaces date xwindow
modules-right = pipewire memory cpu cpu-temp custom-wal systray battery custom-logout
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; Optional settings
; dpi = 96
; tray-ignore-clients = none
; tray-exclusive = true
; tray-whitelist = "megasync"
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
; override-redirect = true

;====================
; Modules
;====================
[module/battery]
type = internal/battery
full-at = 100
low-at = 20
battery = BAT1
adapter = ACAD
label-charging = ÔÉß %percentage%%
label-full =  
label-discharging = %percentage%%
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt
tray-size = 70%

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.background}
label-empty-padding = 1
format = <label-monitor><label-state><label-monitor>
label-monitor = "o"
label-monitor-foreground = ${colors.primary}

[module/xwindow]
type = internal/xwindow
label = %instance%
label-foreground = ${colors.primary}
; label-maxlen = 40

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/cpu-temp]
type = custom/script
exec = ~/.config/polybar/cpu_info.sh
interval = 2
label = %output%
format-prefix = "ÔĚ© "
format-prefix-foreground = ${colors.primary}

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
date-alt = %A-%d-%m-%Y
label = %date%
label-foreground = ${colors.foreground}
; label-font = 2

[module/custom-wal]
type = custom/script
format = <label>
exec = echo "ÓĒĮ"
click-left = source ~/.config/polybar/pywal_wallpaper.sh

[module/custom-logout]
type = custom/script
format = <label>
exec = echo "ÔÄĎ"
click-left = i3-msg exit

[module/pipewire]
type = custom/script
exec = if wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q '[MUTED]'; then echo ÔÄć; else wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2 * 100) "%"}'; fi
interval = 1
label = %output%
format-prefix = "ÔÄ® "
format-prefix-foreground = ${colors.primary}

;====================
; Settings
;====================
[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
