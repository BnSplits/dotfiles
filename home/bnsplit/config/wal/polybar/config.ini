[colors]
background = ${xrdb:color0:#222}
foreground = ${xrdb:color7:#222}
foreground-alt = ${xrdb:color7:#222}
primary = ${xrdb:color1:#222}
secondary = ${xrdb:color2:#222}
alert = ${xrdb:color3:#222}

[bar/mybar]
width = 100%
height = 24pt
radius = 6

; dpi = 96

#tray-ignore-clients = none
#tray-exclusive = true
#tray-whitelist = "megasync"

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "monospace:size=11;0"
font-1 = "Font Awesome 6 Free Solid:style=Solid:size=11;1"
font-2 = "monospace:style=Italic:size=12"

modules-center = date
modules-left = xworkspaces xwindow
modules-right = battery pipewire memory cpu custom-wal systray custom-logout

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/battery]
type = internal/battery
full-at = 100
low-at = 20
battery = BAT0
adapter = ADP1
label-charging = Charging %percentage%%

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

tray-size = 70%

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.background}
label-empty-padding = 1

format = <label-monitor><label-state><label-monitor>
label-monitor =  "o"
label-monitor-foreground = ${colors.primary}

[module/xwindow]
type = internal/xwindow
label = %instance%
#label-maxlen = 40

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1

date = %H:%M:%S
date-alt = %A-%d-%m-%Y

label = %date%
label-foreground = ${colors.foreground}
label-font = 2

[module/custom-wal]
type = custom/script
format = <label>
exec = echo ""
click-left = source ~/.config/polybar/pywal_wallpaper.sh

[module/custom-logout]
type = custom/script
format = <label>
exec = echo ""
click-left = i3-msg exit

[module/pipewire]
type = custom/script
exec = pactl list sinks | grep -E '^[[:space:]]Volume:' | head -n 1 | awk '{print $5}'
interval = 1
label = %output%
format-prefix = "VOL "
format-prefix-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
